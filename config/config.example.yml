colorize_logs: true
log_level: "debug"

# File paths
files: "./files"
thumbnails: "./thumbnails"
db: "./db.sqlite3"

# Tor
blockTorAddresses: true
torExitNodesCheck: 1600
torExitNodesUrl: "https://check.torproject.org/exit-addresses"
torMessage: "TOR IS BLOCKED!"

generate_thumbnails: true
adminEnabled: true
adminApiKey: "asd"
size_limit: 512
enable_checksums: false
port: 8080
filesPerIP: 2
rateLimitPeriod: 20
rateLimitMessage: ""
filename_length: 3
deleteFilesAfter: 7
deleteFilesCheck: 1800
deleteKeyLength: 4

siteInfo: "Whatever you want to put here"
siteWarning: "WARNING!"

blockedExtensions:
  - "exe"

opengraphUseragents:
  - "chatterino-api-cache/"
  - "FFZBot/"
  - "Twitterbot/"
  - "Synapse/"
  - "Mastodon/"

# alternative_domains:
#   - "example.com"
