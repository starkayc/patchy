services:
  patchy:
    image: git.nadeko.net/fijxu/patchy:latest
    # This program should never use that many memory and more than 50% of the cpu,
    # but feel free to adjust it acording to your requirements
    mem_limit: 512MB
    cpus: 0.5
    # If you want to use a custom config file, you can mount it here.
    volumes:
      # IMPORTANT: You need to create the data folder first:
      # mkdir ./data && sudo chown -R 10000:10000 ./data
      - ./data:/data
      # Uncomment this if you want to change the settings of patchy.
      # - ./config.yml:/patchy/config/config.yml:ro
    ports:
      - 127.0.0.1:8080:8080
